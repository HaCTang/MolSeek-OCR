seed: 3407
batch_size: 4
grad_accum: 8
learning_rate: 0.000005
# Optional split learning rates for progressive full SFT:
# - vision_learning_rate controls `model.sam_model` and `model.projector`
# - language_learning_rate controls language model blocks (e.g. `model.layers`)
# If null, fallback to `learning_rate`.
vision_learning_rate: 0.000005
language_learning_rate: 0.00002
weight_decay: 0.001
warmup_steps: 50
max_steps: 400
epochs: 0.0
save_steps: 100
optim: adamw_torch_fused
allow_tf32: true
enable_gradient_checkpointing: true
dataloader_num_workers: 8
dataloader_prefetch_factor: 2
dataloader_persistent_workers: false
image_size: 768
base_size: 1024
crop_mode: true
load_in_4bit: false
attn_implementation: flash_attention_2
output_dir: ./weight_progressive_sft
ddp_find_unused_parameters: false
ddp_backend: nccl
ddp_timeout_seconds: 1800
use_accelerate: true
accelerate_num_processes: 4
accelerate_gpu_ids: "5,6,7,8,9"
train_on_responses_only: true
# Freeze by language layer indices (e.g. [0,1,2] -> freeze model.layers.0/1/2).
freeze_layers: []
# Freeze by module-name substring matching (similar to LoRA target_modules).
# Example:
# freeze_modules:
#   - model.embed_tokens
#   - model.sam_model.patch_embed
#   - model.sam_model.blocks.0
freeze_modules: 
  - model.embed_tokens
  - model.sam_model.patch_embed
  - model.qwen2_model.query_768
  - model.qwen2_model.query_1024
log_train_accuracy: true
train_accuracy_log_steps: 20
restart:
  enable: false
  dir: ./weight_progressive_sft
  auto_resume_from_latest_checkpoint: true
  resume_from_checkpoint: null
  wandb_resume_same_run: true
wandb: false
wandb_project: ChemSeek-OCR
wandb_run_name: smiles-progressive-lr0.000005-fullsft-after-merged-lora-3X64k-1epoch
wandb_api_key: null
