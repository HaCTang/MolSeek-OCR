# ===========================================================================
# GSPO RL Evaluation Config
# Evaluate verl FSDP checkpoints (global_step_*) on configured benchmarks.
#
# Usage:
#   python evaluation_gspo.py --config evaluation_gspo_config.yaml
#   python evaluation_gspo.py --config evaluation_gspo_config.yaml --checkpoint_step 400
# ===========================================================================

# Root directory containing global_step_* checkpoint directories
weight_root: ./weight_gspo_rl_verl_test3

# Choose one of:
# 1) checkpoint_path (highest priority), e.g. ./weight_gspo_rl_verl_test3/global_step_400
# 2) checkpoint_step, resolved to <weight_root>/global_step_<step>
# 3) checkpoint_name, e.g. global_step_400
# 4) if all null, auto use latest global_step_* under weight_root
checkpoint_path: null
checkpoint_step: 400
checkpoint_name: null

# Output directory for evaluation artifacts/metrics
output_dir: ./gspo_evaluation_outputs

# Directory to cache merged FSDP -> HF models (one subdirectory per checkpoint)
merged_gspo_model_dir: ./merged_gspo_models

# verl FSDP merge backend: "fsdp" or "megatron"
merge_backend: fsdp

image_size: 768
base_size: 1024
crop_mode: true
num_workers: 16
tanimoto: false

# --- Backend: "transformers" (default, sequential) or "vllm" (batch, faster) ---
backend: vllm

# --- vLLM-specific options (only used when backend=vllm) ---
vllm_code_dir: ../DeepSeek-OCR-2/DeepSeek-OCR2-master/DeepSeek-OCR2-vllm
vllm_gpu_memory_utilization: 0.8
vllm_max_model_len: 8192
vllm_tensor_parallel_size: 1

# --- Multi-GPU data parallelism ---
num_gpus: 2
# Optional explicit physical GPU ids. If set, overrides num_gpus.
gpu_ids: [8, 9]


# null means run all enabled benchmarks.
selected_benchmarks: null

