# ===========================================================================
# GSPO RL – verl Configuration
# For DeepSeek-OCR-2 on 4x RTX 6000 Ada (48 GB each)
#
# GSPO replaces KL regularisation with tight symmetric clipping, yielding
# more stable policy updates.
# ===========================================================================

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model:
  path: ./weight_progressive_sft/checkpoint-2000
  trust_remote_code: true
  enable_gradient_checkpointing: true
  attn_implementation: flash_attention_2
  use_fused_kernels: false

# ---------------------------------------------------------------------------
# Data  (CSV -> parquet, run "prepare-data" first)
# ---------------------------------------------------------------------------
data:
  output_dir: ./verl_data
  save:
    train_file: ./verl_data/train.parquet
    val_file: ./verl_data/val.parquet
  instruction: "<image>\n Give me the SMILES of the molecule. "
  max_prompt_length: 2048
  max_response_length: 128
  val_split:
    enabled: false
    ratio: 0.02
    min_samples: 100

  train_sets:
    - train_csv: ./training_data/pubchem/train_1m.csv
      data_mode: dynamic
      pre_rendered_image_dir: ./training_data/pubchem/train_200k_chemdraw_like
      style: molscribe_default # molscribe_default / chemdraw_like
      mol_augment: true
      include_condensed: false
      sample_num: 12800

    - train_csv: ./training_data/pubchem/train_1m.csv
      data_mode: dynamic
      pre_rendered_image_dir: ./training_data/pubchem/train_200k_molscribe_default
      style: chemdraw_like # molscribe_default / chemdraw_like
      mol_augment: false
      include_condensed: false
      sample_num: 12800

    - train_csv: ./training_data/uspto_mol/train_680k.csv
      data_mode: realistic
      realistic_image_root: ./training_data
      sample_num: 6400

# ---------------------------------------------------------------------------
# Runtime control kept outside hydra_cli_overrides
# ---------------------------------------------------------------------------
output_dir: ./weight_gspo_rl_verl_test6
allow_tf32: true
gpu_ids: "2,3,4,5,6,7,8,9"
# Optional. If unset, use <data.output_dir>/val.parquet when present, else train.parquet.
val_parquet: null
# Freeze settings are consumed by external_lib patch logic.
freeze_layers: [0]
freeze_modules:
  - model.sam_model
  - model.embed_tokens

# ---------------------------------------------------------------------------
# Hydra CLI overrides (use original verl key names directly)
# These keys map 1:1 to gspo_rl_verl.py cmd (around 984-1085).
# ---------------------------------------------------------------------------
hydra_cli_overrides:
  "algorithm.adv_estimator": grpo
  "algorithm.norm_adv_by_std_in_grpo": true
  "algorithm.use_kl_in_reward": false
  "algorithm.kl_ctrl.kl_coef": 0.0

  "actor_rollout_ref.model.trust_remote_code": true
  "actor_rollout_ref.model.enable_gradient_checkpointing": true
  "++actor_rollout_ref.model.override_config.attn_implementation": flash_attention_2
  "actor_rollout_ref.model.use_fused_kernels": false

  "actor_rollout_ref.actor.optim.lr": 1.0e-6
  "actor_rollout_ref.actor.optim.weight_decay": 0.01
  "actor_rollout_ref.actor.optim.clip_grad": 5.0
  "actor_rollout_ref.actor.optim.lr_warmup_steps_ratio": 0
  "actor_rollout_ref.actor.policy_loss.loss_mode": gspo
  "actor_rollout_ref.actor.loss_agg_mode": seq-mean-token-mean
  "actor_rollout_ref.actor.clip_ratio_low": 0.1
  "actor_rollout_ref.actor.clip_ratio_high": 0.28
  "actor_rollout_ref.actor.clip_ratio_c": 3.0
  "actor_rollout_ref.actor.use_kl_loss": false
  "actor_rollout_ref.actor.kl_loss_coef": 0.0
  "actor_rollout_ref.actor.use_dynamic_bsz": true
  "actor_rollout_ref.actor.ppo_mini_batch_size": 8
  "actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu": 4
  "actor_rollout_ref.actor.ppo_max_token_len_per_gpu": 5120
  "actor_rollout_ref.actor.entropy_coeff": 0.001
  "actor_rollout_ref.actor.ppo_epochs": 1
  "actor_rollout_ref.actor.freeze_vision_tower": true
  "actor_rollout_ref.actor.fsdp_config.param_offload": false
  "actor_rollout_ref.actor.fsdp_config.optimizer_offload": false
  "actor_rollout_ref.actor.fsdp_config.use_orig_params": true
  "actor_rollout_ref.actor.fsdp_config.model_dtype": bf16
  "+actor_rollout_ref.actor.fsdp_config.mixed_precision.param_dtype": bf16
  "+actor_rollout_ref.actor.fsdp_config.mixed_precision.reduce_dtype": fp32
  "+actor_rollout_ref.actor.fsdp_config.mixed_precision.buffer_dtype": fp32

  "actor_rollout_ref.rollout.name": vllm
  "actor_rollout_ref.rollout.tensor_model_parallel_size": 2
  "actor_rollout_ref.rollout.max_model_len": 3072
  "actor_rollout_ref.rollout.gpu_memory_utilization": 0.4
  "actor_rollout_ref.rollout.n": 8
  "actor_rollout_ref.rollout.temperature": 0.3
  "actor_rollout_ref.rollout.top_p": 0.95
  "actor_rollout_ref.rollout.val_kwargs.temperature": 0.0
  "actor_rollout_ref.rollout.val_kwargs.top_p": 1.0
  "actor_rollout_ref.rollout.val_kwargs.n": 1
  "actor_rollout_ref.rollout.enable_chunked_prefill": false
  "actor_rollout_ref.rollout.enforce_eager": true
  "actor_rollout_ref.rollout.free_cache_engine": true
  "actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu": 4

  "actor_rollout_ref.ref.fsdp_config.param_offload": true
  "actor_rollout_ref.ref.fsdp_config.model_dtype": bf16
  "+actor_rollout_ref.ref.fsdp_config.mixed_precision.param_dtype": bf16
  "+actor_rollout_ref.ref.fsdp_config.mixed_precision.reduce_dtype": fp32
  "+actor_rollout_ref.ref.fsdp_config.mixed_precision.buffer_dtype": fp32
  "actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu": 4

  "data.train_batch_size": 16
  "data.max_prompt_length": 3072
  "data.max_response_length": 128
  "data.return_raw_chat": true
  "data.filter_overlong_prompts": true
  "data.filter_overlong_prompts_workers": 16
  "data.truncation": error
  "data.image_key": image
  "data.trust_remote_code": true
  "data.custom_cls.name": ChemSeekOCRDataset

  "reward_model.reward_manager": naive
  "custom_reward_function.name": compute_score
  "+custom_reward_function.reward_kwargs.reward_weights.validity": 0.0
  "+custom_reward_function.reward_kwargs.reward_weights.tanimoto": 3.0
  "+custom_reward_function.reward_kwargs.reward_weights.canon_smiles": 1.0
  "+custom_reward_function.reward_kwargs.reward_weights.graph": 2.0
  "+custom_reward_function.reward_kwargs.reward_weights.chiral": 1.0
  "+custom_reward_function.reward_kwargs.reward_weights.repetition_penalty": 2.0
  "+custom_reward_function.reward_kwargs.chiral_no_annotation_reward": 0.0
  "trainer.critic_warmup": 0
  "trainer.n_gpus_per_node": 8
  "trainer.nnodes": 1
  "trainer.save_freq": 100
  "trainer.test_freq": -1
  "trainer.total_epochs": 1
  "trainer.val_before_train": false
  "trainer.project_name": ChemSeek-OCR
  "trainer.experiment_name": gspo-verl-10gpu

wandb:
  enabled: true
  project: ChemSeek-OCR
  run_name: gspo-verl-8gpu-test6
  api_key: null
