seed: 3407
batch_size: 4
grad_accum: 8
learning_rate: 0.0002
weight_decay: 0.001
warmup_steps: 100
max_steps: 1500
epochs: 0.0
save_steps: 50
optim: adamw_torch_fused
allow_tf32: true
enable_gradient_checkpointing: true
dataloader_num_workers: 8
dataloader_prefetch_factor: 2
dataloader_persistent_workers: false
image_size: 768
base_size: 1024
crop_mode: true
load_in_4bit: false
attn_implementation: flash_attention_2
output_dir: ./weight_lora_sft
lora_r: 64
lora_alpha: 64
lora_dropout: 0.1
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
  - projector.layers
  - qkv 
  - proj
  - lin1
  - lin2
ddp_find_unused_parameters: true
ddp_backend: nccl
ddp_timeout_seconds: 1800
use_accelerate: true
accelerate_num_processes: 4
accelerate_gpu_ids: "0,1,2,3"
train_on_responses_only: true
restart:
  enable: false
  dir: ./weight
  auto_resume_from_latest_checkpoint: true
  resume_from_checkpoint: null
  wandb_resume_same_run: true
wandb: true
wandb_project: ChemSeek-OCR
wandb_run_name: test4
