pretrained_weight_path: ../DeepSeek-OCR-2
train_sets:
  # pre_rendered mode example (uses pre-rendered images)
  - train_csv: ./training_data/pubchem/train_200k.csv
    data_mode: pre_rendered # dynamic / pre_rendered / realistic
    pre_rendered_image_dir: ./training_data/pubchem/train_200k_chemdraw_like
    instruction: "<image>\n Give me the SMILES of the molecule. "
    sample_num: 64000 # null or the number of samples to use

  - train_csv: ./training_data/pubchem/train_200k.csv
    data_mode: pre_rendered # dynamic / pre_rendered / realistic
    pre_rendered_image_dir: ./training_data/pubchem/train_200k_molscribe_default
    instruction: "<image>\n Give me the SMILES of the molecule. "
    sample_num: 64000 # null or the number of samples to use

  - train_csv: ./training_data/uspto_mol/train_200k.csv
    data_mode: realistic
    realistic_image_root: ./training_data
    instruction: "<image>\n Give me the SMILES of the molecule. "
    sample_num: 64000

  # dynamic mode example (keeps style/molecule augmentation controls)
  # - train_csv: ./training_data/pubchem/train_200k.csv
  #   data_mode: dynamic
  #   pre_rendered_image_dir: null
  #   realistic_image_root: null
  #   instruction: "<image>\n Give me the SMILES of the molecule. "
  #   style: molscribe_default
  #   mol_augment: true
  #   include_condensed: False
  #   max_samples: null
  #   sample_num: null

  # realistic mode example (reads image path from CSV column `file_path`)
  # - train_csv: ./training_data/uspto_mol/train_200k.csv
  #   data_mode: realistic
  #   realistic_image_root: ./training_data
  #   instruction: "<image>\n Give me the SMILES of the molecule. "
  #   sample_num: null

enable_val_sets: false
eval_every_steps: 1500 # only intermediate steps (not step0/final)
eval_on_start: false
