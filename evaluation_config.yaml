pretrained_weight_path: ../DeepSeek-OCR-2/hf_cache/models--deepseek-ai--DeepSeek-OCR-2/snapshots/aaa02f3811945a91062062994c5c4a3f4c0af2b0
weight_root: ./weight_lora_sft
# mode: lora / full
full_or_lora: lora

# Choose one of:
# 1) checkpoint_path (highest priority), e.g. ./weight/checkpoint-1500
# 2) checkpoint_step, resolved to <weight_root>/checkpoint-<step>
# 3) checkpoint_name, e.g. checkpoint-1500
# 4) if all null, auto use latest checkpoint-* under weight_root
checkpoint_path: null
checkpoint_step: 1200
checkpoint_name: null

# output directory for evaluation artifacts/metrics
output_dir: ./lora_sft_evaluation_outputs
# optional alias of output_dir (supported by evaluation.py)
# output_dir_path: ./evaluation_outputs
image_size: 768
base_size: 1024
crop_mode: true
num_workers: 16
tanimoto: false

# --- Backend: "transformers" (default, sequential) or "vllm" (batch, faster) ---
# backend: transformers
backend: vllm

# --- vLLM-specific options (only used when backend=vllm) ---
# Path to the DeepSeek-OCR2-vllm code directory (contains deepseek_ocr2.py, process/, deepencoderv2/)
vllm_code_dir: ../DeepSeek-OCR-2/DeepSeek-OCR2-master/DeepSeek-OCR2-vllm
# Directory to cache merged LoRA+base model weights (one subdirectory per checkpoint)
merged_model_dir: ./merged_lora_sft_3X64_1EPOCH_model
vllm_gpu_memory_utilization: 0.8
vllm_max_model_len: 8192
vllm_tensor_parallel_size: 1

# --- Multi-GPU data parallelism ---
# Each GPU runs an independent model instance, processing different benchmarks in parallel.
# Set to 1 for single-GPU. Set to N to use GPU 0..N-1 simultaneously.
num_gpus: 2
# Optional explicit physical GPU ids. If set, overrides num_gpus.
# Example: [1, 3]
gpu_ids: [0, 1]


# null means run all enabled benchmarks.
