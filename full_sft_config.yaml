seed: 3407
batch_size: 4
grad_accum: 8
learning_rate: 0.00001
# Optional split learning rates:
# - vision_learning_rate controls `model.sam_model` and `model.projector`
# - language_learning_rate controls the language model blocks (e.g. `model.layers`)
# If null, fallback to `learning_rate`.
vision_learning_rate: 0.000005
language_learning_rate: 0.00002
weight_decay: 0.001
warmup_steps: 100
max_steps: 1500
epochs: 0.0
save_steps: 150
optim: adamw_torch_fused
allow_tf32: true
enable_gradient_checkpointing: true
dataloader_num_workers: 8
dataloader_prefetch_factor: 2
dataloader_persistent_workers: false
image_size: 768
base_size: 1024
crop_mode: true
load_in_4bit: false
attn_implementation: flash_attention_2
output_dir: ./weight_full_sft
ddp_find_unused_parameters: false
ddp_backend: nccl
ddp_timeout_seconds: 1800
use_accelerate: true
accelerate_num_processes: 4
accelerate_gpu_ids: "6,7,8,9"
train_on_responses_only: true
# Freeze by language layer indices (DeepSeek-OCR-2 has 12 language layers: 0-11).
# For image->SMILES, freeze lower language layers and keep upper layers trainable.
freeze_layers: [0, 1]
# Freeze by module-name substring matching, similar in spirit to LoRA `target_modules`.
# Here we freeze low-level visual blocks, while keeping visual high-level blocks (8-11)
# and projector trainable for OCR adaptation.
freeze_modules:
  - model.embed_tokens
  - model.sam_model.patch_embed
  - model.sam_model.blocks.0
  - model.sam_model.blocks.1
  - model.sam_model.blocks.2
  - model.sam_model.blocks.3
  - model.sam_model.blocks.4
  - model.sam_model.blocks.5
  - model.sam_model.blocks.6
  - model.sam_model.blocks.7
log_train_accuracy: true
train_accuracy_log_steps: 20
restart:
  enable: false
  dir: ./weight_full_sft
  auto_resume_from_latest_checkpoint: true
  resume_from_checkpoint: null
  wandb_resume_same_run: true
wandb: false
wandb_project: ChemSeek-OCR
wandb_run_name: smiles-fullsft-3X64k-1epoch-lr0.00001-afterlora-finetune
wandb_api_key: null
